<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Registration | NIHC</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <h1>Player Registration</h1>

    <form name="player-registration"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
          enctype="multipart/form-data">

      <!-- REQUIRED -->
      <input type="hidden" name="form-name" value="player-registration">

      <!-- SPAM PROTECTION -->
      <p style="display:none">
        <label>Don’t fill this out:
          <input name="bot-field">
        </label>
      </p>

      <div class="form-grid">

        <input name="first_name" placeholder="FIRST NAME" required>
        <input name="last_name" placeholder="LAST NAME" required>

        <input type="date" name="dob">
        <input name="weight" placeholder="WEIGHT">

        <input name="height" placeholder="HEIGHT">

        <select name="hand">
          <option value="">SHOT / CATCH HAND</option>
          <option>Left</option>
          <option>Right</option>
        </select>

        <input name="country" placeholder="COUNTRY">
        <input name="state" placeholder="STATE / PROVINCE">

        <input name="city" placeholder="CITY / TOWN">
        <input name="drafted" placeholder="DRAFTED BY">

        <input name="committed" placeholder="COMMITTED TO" class="full">

        <textarea name="bio" placeholder="PLAYER BIO" class="full"></textarea>

      </div>

      <!-- PHOTO -->
      <div style="margin-top: 20px;">
        <label>UPLOAD PLAYER PHOTO (ID)</label>
        <input type="file" name="photo">
      </div>

      <!-- TERMS -->
      <div style="margin-top: 20px;">
        <label>
          <input type="checkbox" required>
          I agree to the Privacy Policy and Terms
        </label>
      </div>

      <!-- SUBMIT -->
      <button type="submit">SUBMIT REGISTRATION</button>

    </form>

  </div>

</div>

</body>
</html>
