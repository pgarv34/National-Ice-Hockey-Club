<form name="player-registration"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      enctype="multipart/form-data"
      class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <!-- REQUIRED -->
  <input type="hidden" name="form-name" value="player-registration">

  <!-- SPAM PROTECTION -->
  <p style="display:none">
    <label>Don’t fill this out:
      <input name="bot-field">
    </label>
  </p>

  <!-- NAMES -->
  <input name="first_name" placeholder="First Name" required class="p-3 bg-gray-900 rounded">
  <input name="last_name" placeholder="Last Name" required class="p-3 bg-gray-900 rounded">

  <!-- DOB + WEIGHT -->
  <input type="date" name="dob" class="p-3 bg-gray-900 rounded">
  <input name="weight" placeholder="Weight" class="p-3 bg-gray-900 rounded">

  <!-- HEIGHT + HAND -->
  <input name="height" placeholder="Height" class="p-3 bg-gray-900 rounded">

  <select name="hand" class="p-3 bg-gray-900 rounded">
    <option value="">Shot / Catch Hand</option>
    <option>Left</option>
    <option>Right</option>
  </select>

  <!-- LOCATION -->
  <input name="country" placeholder="Country" class="p-3 bg-gray-900 rounded">
  <input name="state" placeholder="State / Province" class="p-3 bg-gray-900 rounded">

  <input name="city" placeholder="City / Town" class="p-3 bg-gray-900 rounded">
  <input name="drafted" placeholder="Drafted By" class="p-3 bg-gray-900 rounded">

  <!-- FULL WIDTH -->
  <input name="committed" placeholder="Committed To" class="p-3 bg-gray-900 rounded col-span-2">

  <textarea name="bio" placeholder="Player Bio" class="p-3 bg-gray-900 rounded col-span-2"></textarea>

  <!-- PHOTO -->
  <div class="col-span-2">
    <label class="block mb-2">Upload Player Photo (ID)</label>
    <input type="file" name="photo" class="p-2 bg-gray-900 rounded w-full">
  </div>

  <!-- TERMS -->
  <div class="col-span-2 flex items-center space-x-2 mt-4">
    <input type="checkbox" required>
    <label>I agree to the Privacy Policy and Terms</label>
  </div>

  <!-- SUBMIT -->
  <button type="submit" class="bg-red-600 py-3 rounded font-semibold col-span-2 hover:bg-red-700">
    Submit Registration
  </button>

</form>
