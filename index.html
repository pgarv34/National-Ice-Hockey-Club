<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>National Ice Hockey Club | UK Hockey</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .animate-marquee {
      animation: marquee 15s linear infinite;
    }
  </style>
</head>

<body class="bg-black text-white font-sans">

<!-- 🇬🇧 STRIPE -->
<div class="h-1 bg-gradient-to-r from-red-600 via-white to-blue-700"></div>

<!-- 🔴 TICKER -->
<div class="bg-red-600 text-white text-sm py-2 overflow-hidden whitespace-nowrap">
  <div id="ticker" class="animate-marquee inline-block">
    🏒 UK Hockey Registration Open • Fixtures Live • Join Now •
  </div>
</div>

<!-- NAV -->
<header class="bg-black p-4 flex justify-between items-center">
  <img src="./logo.png" class="h-12">
  <nav class="space-x-6">
    <a href="#fixtures">Fixtures</a>
    <a href="#join">Join</a>
  </nav>
</header>

<!-- HERO -->
<section class="relative min-h-screen flex items-center justify-center text-center">
  <img src="./hero.jpg" class="absolute w-full h-full object-cover opacity-30">

  <div class="relative z-10">
    <img src="./logo.png" class="mx-auto mb-6 w-24">

    <h1 class="text-5xl font-bold mb-4">
      National Ice Hockey Club
    </h1>

    <p class="text-gray-300 mb-6">
      UK Hockey League
    </p>

    <a href="#join" class="bg-red-600 px-6 py-3 rounded-lg">
      Join Now
    </a>
  </div>
</section>

<!-- FIXTURES (GAMESHEET IFRAME) -->
<section id="fixtures" class="max-w-7xl mx-auto py-20 px-4">
  <h2 class="text-3xl font-bold mb-6">Fixtures & Schedule</h2>

  <div class="bg-gray-900 p-4 rounded-xl">
    <iframe 
      src="https://gamesheetstats.com/seasons/11696/schedule?configuration[primary-colour]=FFFFFF&configuration[secondary-colour]=1A2841"
      class="w-full h-[900px] rounded-xl"
      frameborder="0">
    </iframe>
  </div>
</section>
  <!-- GALLERY -->
<section id="gallery" class="max-w-7xl mx-auto py-20 px-4">
  <h2 class="text-3xl font-bold mb-10 text-center">🏆 Previous Winners</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">

    <!-- ITEM -->
    <div class="group relative overflow-hidden rounded-xl">
      <img src="./gallery1.jpg" class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">
      <div class="absolute bottom-0 bg-black/70 w-full p-3 text-center">
        <p class="font-semibold">2025 Champions</p>
        <p class="text-sm text-gray-300">Altrincham Jets</p>
      </div>
    </div>

    <!-- ITEM -->
    <div class="group relative overflow-hidden rounded-xl">
      <img src="./gallery2.jpg" class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">
      <div class="absolute bottom-0 bg-black/70 w-full p-3 text-center">
        <p class="font-semibold">2024 Champions</p>
        <p class="text-sm text-gray-300">Manchester Storm Dev</p>
      </div>
    </div>

    <!-- ITEM -->
    <div class="group relative overflow-hidden rounded-xl">
      <img src="./gallery3.jpg" class="w-full h-64 object-cover group-hover:scale-110 transition duration-500">
      <div class="absolute bottom-0 bg-black/70 w-full p-3 text-center">
        <p class="font-semibold">2023 Champions</p>
        <p class="text-sm text-gray-300">Leeds Knights</p>
      </div>
    </div>

  </div>
</section>
<!-- JOIN -->
<section id="join" class="text-center py-20 px-4">
  <h2 class="text-3xl font-bold mb-6">Join the League</h2>

  <form onsubmit="sendEmail(); return false;" class="max-w-md mx-auto space-y-4">
    <input id="name" type="text" placeholder="Your Name" required class="w-full p-3 bg-gray-800 rounded">
    <input id="email" type="email" placeholder="Email" required class="w-full p-3 bg-gray-800 rounded">
    <textarea id="experience" placeholder="Experience" class="w-full p-3 bg-gray-800 rounded"></textarea>

    <button class="bg-red-600 px-6 py-3 rounded w-full">
      Register
    </button>
  </form>
</section>

<!-- SCRIPT -->
<script>
function sendEmail() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const exp = document.getElementById('experience').value;

  window.location.href =
    `mailto:NIHCleague@gmail.com?subject=Join UK Hockey&body=Name: ${name}%0D%0AEmail: ${email}%0D%0AExperience: ${exp}`;
}
</script>

</body>
</html>
