<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NIHC League</title>

  <!-- SEO -->
  <meta name="description" content="NIHC League - UK Inline Hockey League, fixtures, teams, and results.">

  <!-- Force HTTPS (extra layer) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <!-- Basic Security Headers (fallback if Netlify headers not set) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- Styles -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
    }

    .container {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    footer {
      background: #111827;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>NIHC League</h1>
  <nav>
    <a href="/">Home</a>
    <a href="/teams.html">Teams</a>
    <a href="/fixtures.html">Fixtures</a>
    <a href="/contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h2>Welcome to the NIHC League</h2>
  <p>Official UK inline hockey league providing competitive opportunities for teams across the country.</p>

  <h3>Contact Us</h3>

  <!-- 🔐 SECURE NETLIFY FORM -->
  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" data-netlify-recaptcha="true">

    <!-- Required hidden input -->
    <input type="hidden" name="form-name" value="contact">

    <!-- Honeypot (spam protection) -->
    <p style="display:none">
      <label>Don’t fill this out if you're human:
        <input name="bot-field">
      </label>
    </p>

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Message</label>
    <textarea name="message" required></textarea>

    <!-- CAPTCHA -->
    <div data-netlify-recaptcha="true"></div>

    <button type="submit">Send</button>
  </form>
</div>

<footer>
  <p>&copy; 2026 NIHC League. All rights reserved.</p>

  <!-- 🔐 IMPORTANT LEGAL LINKS -->
  <p>
    <a href="/privacy.html" style="color:#9ca3af;">Privacy Policy</a>
  </p>
</footer>

</body>
</html>
