name: Update Gamesheet Data

on:
  workflow_dispatch:
  push:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python -m pip install requests beautifulsoup4

      - name: Create parser script
        run: |
          cat << 'EOF' > script.py
import requests
from bs4 import BeautifulSoup
import json

games = []

try:
    url = "https://gamesheetstats.com/seasons/11696/schedule"
    headers = {"User-Agent": "Mozilla/5.0"}
    res = requests.get(url, headers=headers, timeout=10)

    soup = BeautifulSoup(res.text, "html.parser")
    rows = soup.find_all("tr")

    for row in rows:
        cols = row.find_all("td")

        if len(cols) >= 3:
            try:
                teams_text = cols[1].get_text(strip=True)

                if "vs" not in teams_text:
                    continue

                home, away = [t.strip() for t in teams_text.split("vs")]
                score_text = cols[2].get_text(strip=True)

                if "-" in score_text:
                    h, a = score_text.split("-")
                    games.append({
                        "home": home,
                        "away": away,
                        "homeScore": int(h),
                        "awayScore": int(a),
                        "status": "finished"
                    })
                else:
                    games.append({
                        "home": home,
                        "away": away,
                        "homeScore": 0,
                        "awayScore": 0,
                        "status": "upcoming"
                    })
            except:
                continue

except Exception as e:
    print("Error:", e)

if not games:
    games = [{
        "home": "UK Hockey",
        "away": "Data Pending",
        "homeScore": 0,
        "awayScore": 0,
        "status": "upcoming"
    }]

with open("data.json", "w") as f:
    json.dump({"games": games[:10]}, f, indent=2)
EOF

      - name: Run parser
        run: python script.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update gamesheet data"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
