name: Update Gamesheet Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python -m pip install requests beautifulsoup4

      - name: Generate data.json (SAFE TEST)
        run: |
          echo "import json" > script.py
          echo "games = [{" >> script.py
          echo "  \"home\": \"Jets\"," >> script.py
          echo "  \"away\": \"Storm\"," >> script.py
          echo "  \"homeScore\": 5," >> script.py
          echo "  \"awayScore\": 2," >> script.py
          echo "  \"status\": \"finished\"" >> script.py
          echo "}]" >> script.py
          echo "with open('data.json','w') as f: json.dump({'games':games}, f)" >> script.py

          python script.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update data"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
