name: Update Gamesheet Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        run: |
          python -m pip install requests beautifulsoup4

      - name: Run script
        run: |
          echo "import json" > script.py
          echo "games = [{\"home\":\"Jets\",\"away\":\"Storm\",\"homeScore\":5,\"awayScore\":2,\"status\":\"finished\"}]" >> script.py
          echo "with open('data.json','w') as f: json.dump({'games':games}, f)" >> script.py
          python script.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update data" || echo "No changes"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
