<!-- =========================
WINNER PICKER TOOL
========================= -->
<!DOCTYPE html>
<html>
<head>
<title>Winner Picker</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; padding:50px; }
button { padding:15px 30px; font-size:18px; background:#8B0000; color:#fff; border:none; cursor:pointer; }
.result { margin-top:30px; font-size:24px; }
</style>
</head>
<body>

<h1>NIHC Winner Picker</h1>
<p>Enter total tickets sold:</p>

<input id="max" type="number" placeholder="e.g. 150">
<br><br>
<button onclick="pickWinner()">Pick Winner</button>

<div class="result" id="result"></div>

<script>
function pickWinner(){
  let max = document.getElementById('max').value;
  let winner = Math.floor(Math.random() * max) + 1;
  document.getElementById('result').innerHTML = `🏆 Winning Ticket: #${winner}`;
}
</script>

</body>
</html>
