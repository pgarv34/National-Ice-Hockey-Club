<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NIHC Live Draw</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
}

.ticket {
  font-size: 5rem;
  margin: 20px 0;
  color: #facc15;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  background: #8B0000;
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  background: #b30000;
}

.small {
  margin-top: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>NIHC Draft Giveaway</h1>

<div class="ticket" id="ticket">---</div>

<button onclick="draw()">Draw Winner</button>

<p class="small">Live Draw • May 2nd</p>

</div>

<script>
function draw() {
  const max = 150;
  let count = 0;

  const interval = setInterval(() => {
    const num = Math.floor(Math.random() * max) + 1;
    document.getElementById("ticket").innerText = "#" + num;
    count++;

    if (count > 25) {
      clearInterval(interval);
    }
  }, 80);
}
</script>
